<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lucky Loop — autoresearch demo (voice)</title>
<style>
  :root {
    --bg: #0b0f14;
    --panel: #121822;
    --panel-2: #0e141d;
    --line: #1f2a38;
    --ink: #e6edf3;
    --muted: #8aa0b6;
    --accent: #59e0b0;
    --predict: #7aa2ff;
    --run: #ffcf6b;
    --verify: #ff8e8e;
    --good: #59e0b0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(1200px 700px at 70% -10%, #14202e 0%, var(--bg) 55%);
    color: var(--ink);
    font: 15px/1.55 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }
  header { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  h1 { font-size: 24px; margin: 0; letter-spacing: -0.02em; }
  .tag { color: var(--muted); font-size: 14px; }
  .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; }

  .controls {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin: 24px 0 8px;
  }
  button {
    font: inherit; font-weight: 600; cursor: pointer;
    border-radius: 10px; padding: 10px 16px; border: 1px solid var(--line);
    color: var(--ink); background: var(--panel); transition: .15s ease;
  }
  button:hover:not(:disabled) { border-color: #2c3c50; transform: translateY(-1px); }
  button:disabled { opacity: .5; cursor: default; }
  #runBtn { background: linear-gradient(180deg, #1d7a59, #13503c); border-color: #1d7a59; }
  #runBtn:hover:not(:disabled) { border-color: var(--accent); }
  #voiceBtn[data-on="true"] { border-color: var(--predict); color: #cdddff; }
  .hint { color: var(--muted); font-size: 13px; margin-top: 4px; }

  .stage { margin-top: 28px; display: flex; flex-direction: column; gap: 14px; }
  .step {
    border: 1px solid var(--line); border-left: 3px solid var(--line);
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border-radius: 12px; padding: 14px 16px;
    opacity: 0; transform: translateY(10px);
    transition: opacity .45s ease, transform .45s ease, border-color .45s ease;
  }
  .step.show { opacity: 1; transform: none; }
  .step .chip {
    display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; padding: 3px 8px; border-radius: 999px;
    border: 1px solid currentColor; margin-bottom: 8px;
  }
  .step .body { color: var(--ink); }
  .step .body b { color: #fff; }
  .step .sub { color: var(--muted); font-size: 13.5px; margin-top: 4px; }
  .step[data-kind="propose"] { border-left-color: var(--accent); } .step[data-kind="propose"] .chip { color: var(--accent); }
  .step[data-kind="predict"] { border-left-color: var(--predict); } .step[data-kind="predict"] .chip { color: var(--predict); }
  .step[data-kind="run"]     { border-left-color: var(--run); }     .step[data-kind="run"] .chip     { color: var(--run); }
  .step[data-kind="verify"]  { border-left-color: var(--verify); }  .step[data-kind="verify"] .chip  { color: var(--verify); }
  .step[data-kind="loop"]    { border-left-color: var(--muted); }   .step[data-kind="loop"] .chip    { color: var(--muted); }

  footer { margin-top: 40px; color: var(--muted); font-size: 12.5px; border-top: 1px solid var(--line); padding-top: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Lucky Loop</h1>
    <span class="tag mono">predict before compute · verify before claim</span>
  </header>

  <div class="controls">
    <button id="runBtn">▶ Run the loop</button>
    <button id="voiceBtn" data-on="false">🔇 Voice off</button>
  </div>
  <div class="hint" id="hint">Toggle voice <b>before</b> running — the browser only allows audio after a click. Web Speech API, zero backend.</div>

  <div class="stage" id="stage"></div>

  <footer class="mono">
    Browser-native Web Speech API (speechSynthesis). No API key, no server, no network.
  </footer>
</div>

<script>
/* ── Voice narration — vanilla version from web/VOICE.md (zero backend, zero API) ── */
function makeVoice({ rate = 1.05 } = {}) {
  let enabled = false, voice = null;
  const synth = window.speechSynthesis;
  const supported = !!synth;
  function pick() {
    const vs = synth ? synth.getVoices() : [];
    voice = vs.find(v => /en[-_]US/i.test(v.lang) && /samantha|google|natural|aria/i.test(v.name))
         || vs.find(v => /^en/i.test(v.lang)) || vs[0] || null;
  }
  if (supported) { pick(); synth.onvoiceschanged = pick; }
  return {
    supported,
    isOn: () => enabled,
    toggle() {
      enabled = !enabled;
      if (!enabled) synth.cancel();
      else this.speak("Voice narration on. Let's do some science.");  // unlocks autoplay on the click
      return enabled;
    },
    speak(text) {
      if (!enabled || !supported || !text) return;
      const u = new SpeechSynthesisUtterance(text);
      if (voice) u.voice = voice;
      u.rate = rate;
      synth.speak(u);
    },
  };
}

/* ── The autoresearch loop: one demo pass, animated step by step ──
   Each step has a card (what you see) and a fun narration line (what you hear). */
const STEPS = [
  { kind: "propose", chip: "Question",  html: "New research question: <b>can a small model beat the baseline on this dataset?</b>",
    say: "New research question incoming. Let's see if the machine can actually do science." },
  { kind: "propose", chip: "Propose",   html: "Agent proposes <b>logistic regression</b> with a standard preprocessing pipeline.",
    say: "Agent proposes logistic regression. Bold, classic, let's roll." },
  { kind: "predict", chip: "World model", html: "<b>Qwen-AgentWorld</b> forecasts accuracy <b>0.93–0.95</b> — <span class='sub'>before a single CPU cycle is spent.</span>",
    say: "Qwen-AgentWorld predicts accuracy zero point nine three to zero point nine five, before any compute. Spooky." },
  { kind: "predict", chip: "Decision",  html: "Forecast says the run is cheap and informative. <b>Verdict: worth the compute.</b>",
    say: "Forecast says it's cheap and informative. Verdict: run it." },
  { kind: "run",     chip: "Real run",  html: "Real Python execution → <b>accuracy 0.95</b>. <span class='sub'>The world model called it.</span>",
    say: "Real run: accuracy zero point nine five. The world model nailed the call." },
  { kind: "verify",  chip: "Verifier",  html: "Verifier: <b>single split, observation only.</b> Not a robust claim — and we say so.",
    say: "Verifier says: single split, observation only. No robust claim. We log it honestly, not proudly." },
  { kind: "loop",    chip: "Next",      html: "Next decision: <b>add cross-validation</b> before we brag. The loop continues.",
    say: "Next up: add cross-validation before bragging. And the loop goes round again." },
];

const voice = makeVoice();
const stage = document.getElementById("stage");
const runBtn = document.getElementById("runBtn");
const voiceBtn = document.getElementById("voiceBtn");
const hint = document.getElementById("hint");

if (!voice.supported) {
  voiceBtn.disabled = true;
  voiceBtn.textContent = "🔇 Voice unsupported";
  hint.textContent = "This browser has no Web Speech API — the loop still animates, just silently.";
}

voiceBtn.onclick = () => {
  const on = voice.toggle();
  voiceBtn.dataset.on = String(on);
  voiceBtn.textContent = on ? "🔊 Voice on" : "🔇 Voice off";
};

let running = false;
const wait = ms => new Promise(r => setTimeout(r, ms));

async function runLoop() {
  if (running) return;
  running = true;
  runBtn.disabled = true;
  runBtn.textContent = "● Running…";
  stage.innerHTML = "";

  for (const step of STEPS) {
    const el = document.createElement("div");
    el.className = "step";
    el.dataset.kind = step.kind;
    el.innerHTML = `<span class="chip">${step.chip}</span><div class="body">${step.html}</div>`;
    stage.appendChild(el);
    // reveal on next frame so the transition runs
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add("show")));
    voice.speak(step.say);           // queues; reads steps in order
    await wait(voice.isOn() ? 2600 : 1100);
  }

  runBtn.disabled = false;
  runBtn.textContent = "▶ Run again";
  running = false;
}

runBtn.onclick = runLoop;
</script>
</body>
</html>
